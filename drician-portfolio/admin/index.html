<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Portfolio Analytics</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="admin.css"></head><body>
<main class="shell"><section id="loginView" class="login-card"><p class="eyebrow">PRIVATE DASHBOARD</p><h1>Portfolio analytics</h1><p>Sign in with the private credentials configured in Netlify.</p><form id="loginForm"><label>Username<input name="username" autocomplete="username" required></label><label>Password<input name="password" type="password" autocomplete="current-password" required></label><button type="submit">Sign in</button><p id="loginStatus"></p></form></section>
<section id="dashboardView" class="dashboard" hidden><header><div><p class="eyebrow">PRIVATE DASHBOARD</p><h1>Portfolio analytics</h1></div><button id="logoutBtn" class="ghost">Log out</button></header><div class="stats"><article><span>Total visits</span><strong id="totalViews">—</strong></article><article><span>Unique visitors</span><strong id="uniqueVisitors">—</strong></article><article><span>Visits today</span><strong id="todayViews">—</strong></article><article><span>Average rating</span><strong id="avgRating">—</strong></article></div><section class="panel"><div class="panel-head"><h2>Visits · last 14 days</h2><button id="refreshBtn" class="ghost">Refresh</button></div><div id="chart" class="chart"></div></section><section class="panel"><h2>Recent feedback</h2><div id="feedbackList" class="feedback-list"></div></section></section></main><script src="admin.js"></script></body></html>
